<title>Flashcards</title>
<style>
  :root {

  body {

    text-align: center;

    user-select: none;
  }
  .label {
    font-size: 13px;
    letter-spacing: .08em;
    text-transform: uppercase;
    opacity: .6;
    margin-bottom: 16px;
  }
  .text {
    font-size: clamp(28px, 5.3vw, 42px);
    line-height: 1.35;
    word-break: break-word;
  }
  .hint {
    margin-top: 18px;
    font-size: 15px;
    opacity: .68;
  }
  .footer {
    margin-top: 14px;
    text-align: center;
    font-size: 13px;
    opacity: .55;
  }
  button {
    display: none;
  }
</style>
</head>

let currentIndex = -1;
let showingWord = false;

function randomIndex() {
  if (cards.length <= 1) return 0;
  let next = Math.floor(Math.random() * cards.length);
  while (next === currentIndex) {
    next = Math.floor(Math.random() * cards.length);
  }
  return next;
}

function showDefinition() {
  currentIndex = randomIndex();
  showingWord = false;
  const card = cards[currentIndex];
  document.getElementById('label').textContent = 'Definition';
  document.getElementById('text').textContent = card.def;
  document.getElementById('hint').textContent = 'Tap to reveal the word';
  document.getElementById('footer').textContent = `${cards.length} cards`;
}

function showWord() {
  showingWord = true;
  const card = cards[currentIndex];
  document.getElementById('label').textContent = 'Word';
  document.getElementById('text').textContent = card.word;
  document.getElementById('hint').textContent = 'Tap for next';
}

function handleTap() {
  if (currentIndex === -1) {
    showDefinition();
    return;
  }
  if (!showingWord) {
    showWord();
  } else {
    showDefinition();
  }
}

document.getElementById('card').addEventListener('click', handleTap);
document.getElementById('card').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    handleTap();
  }
});

showDefinition();
</script>
