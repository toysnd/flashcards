<title>NGSL Flashcards Simple</title>
<style>

  .bottom { margin-top: 14px; text-align: center; color: var(--sub); font-size: 13px; line-height: 1.5; }
  .nav { display: flex; gap: 10px; margin-top: 14px; }
  button { flex: 1; border: 1px solid var(--border); background: #fff; border-radius: 14px; padding: 14px 16px; font-size: 16px; color: var(--accent); }
  button:active { transform: scale(0.98); }
</style>
</head>

let index = 0;
let showingDefinition = false;

const card = document.getElementById('card');
const label = document.getElementById('label');
const content = document.getElementById('content');
const hint = document.getElementById('hint');
const counter = document.getElementById('counter');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function render() {
  const item = words[index];
  counter.textContent = `${index + 1} / ${words.length}`;
  if (!showingDefinition) {
    label.textContent = 'WORD';
    content.textContent = item.word;
    content.className = 'content';
    hint.textContent = 'タップで意味を表示';
  } else {
    label.textContent = 'MEANING';
    content.textContent = item.definition;
    content.className = 'content definition';
    hint.textContent = 'もう一度タップで次の単語';
  }
}

function tapCard() {
  if (!showingDefinition) {
    showingDefinition = true;
  } else {
    index = (index + 1) % words.length;
    showingDefinition = false;
  }
  render();
}

function goNext() {
  index = (index + 1) % words.length;
  showingDefinition = false;
  render();
}

function goPrev() {
  index = (index - 1 + words.length) % words.length;
  showingDefinition = false;
  render();
}

card.addEventListener('click', tapCard);
card.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    tapCard();
  }
});
nextBtn.addEventListener('click', goNext);
prevBtn.addEventListener('click', goPrev);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'ArrowLeft') goPrev();
});

render();
</script>
